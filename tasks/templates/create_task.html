{% extends 'base.html' %}

{% block content %}
<main class="container my-5">
   <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
         <div class="card shadow-lg rounded">
            <div class="card-body p-4 p-md-5">

               <h1 class="card-title h3 text-center mb-4">Create Task</h1>

               {% if form.errors %}
                  <div class="alert alert-danger" role="alert">
                     Please correct the errors below.
                  </div>
               {% endif %}

               <form action="/tasks/create/" method="post">
                  {% csrf_token %}

                  {% for field in form %}
                     {% if field.name == 'important' %}
                        <!-- Estilo especial para el Checkbox -->
                        <div class="form-check mb-4">
                           {{ field }}
                           <label class="form-check-label fw-semibold text-secondary" for="{{ field.id_for_label }}">
                              {{ field.label }}
                           </label>
                        </div>
                     {% else %}
                        <!-- Estilo para inputs de texto y textarea -->
                        <div class="mb-3">
                           <label class="form-label fw-semibold text-secondary" for="{{ field.id_for_label }}">
                              {{ field.label }}
                           </label>
                           {{ field }}
                        </div>
                     {% endif %}
                  {% endfor %}

                  <div class="d-grid mt-4">
                     <button class="btn btn-primary btn-lg fs-6 fw-semibold" type="submit">Create Task</button>
                  </div>
               </form>

            </div>
         </div>
      </div>
   </div>
</main>
{% endblock %}

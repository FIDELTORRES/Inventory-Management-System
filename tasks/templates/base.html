<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>{% block title %}Task Manager{% endblock %}</title>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>
      <header>
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                  <div class="container">
                        <a class="navbar-brand" href="{% url 'home' %}">Task Manager</a>
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                              <span class="navbar-toggler-icon"></span>
                        </button>
                        <div class="collapse navbar-collapse" id="navbarNav">
                              <ul class="navbar-nav ms-auto">
                                    <li class="nav-item">
                                          <a class="nav-link" href="/">Home</a>
                                    </li>
                                    {% if user.is_authenticated %}
                                    <li class="nav-item">
                                          <a class="nav-link" href="{% url 'tasks' %}">Pending Task</a>
                                    </li>
                                    <li class="nav-item">
                                          <a class="nav-link" href="{% url 'create_task' %}">Create Task</a>
                                    </li>
                                    <li class="nav-item">
                                          <a class="nav-link" href="{% url 'tasks_completed' %}">Completed Task</a>
                                    </li>
                                    <li class="nav-item">
                                          <a class="nav-link" href="{% url 'logout' %}">Logout</a>
                                    </li>
                                    {% else %}
                                    <li class="nav-item">
                                          <a class="nav-link" href="{% url 'signup' %}">Sign Up</a>
                                    </li>
                                    <li class="nav-item">
                                          <a class="nav-link" href="{% url 'signin' %}">Sign In</a>
                                    </li>
                                    {% endif %}
                              </ul>
                        </div>
                  </div>
            </nav>
      <main>
            {% block content %}
            {% endblock %}
      </main>

      <footer>
            <p>&copy; 2024 Task Manager. All rights reserved.</p>
      </footer>
</body>
</html>
